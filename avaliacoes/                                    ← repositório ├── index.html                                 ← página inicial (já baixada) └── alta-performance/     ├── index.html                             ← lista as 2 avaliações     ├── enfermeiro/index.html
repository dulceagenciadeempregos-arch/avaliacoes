<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliações — Central</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root{
    --bg:#0E2233; --bg-deep:#091622; --elev:#16324A; --grid:#24445F;
    --ink:#EAF2F5; --ink-dim:#93AFC2; --ink-faint:#5D7C90;
    --pulse:#5FD9A4; --pulse-dim:#2E5C4C; --gold:#E8B95C; --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(ellipse at top, #123049 0%, var(--bg) 45%, var(--bg-deep) 100%);
    color:var(--ink); font-family:'IBM Plex Sans',sans-serif;
    min-height:100vh; display:flex; justify-content:center; padding:48px 16px 60px;
  }
  .wrap{ width:100%; max-width:640px; }
  .eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.14em;
    text-transform:uppercase; color:var(--pulse); margin-bottom:10px; }
  h1{ font-family:'Fraunces',serif; font-size:clamp(30px,6vw,40px); font-weight:600; margin:0 0 12px; }
  p.lead{ color:var(--ink-dim); font-size:15px; line-height:1.6; margin:0 0 32px; max-width:52ch; }
  .card{
    display:flex; justify-content:space-between; align-items:center; gap:16px;
    background:var(--elev); border:1px solid var(--grid); border-radius:var(--radius);
    padding:22px 24px; text-decoration:none; color:var(--ink); margin-bottom:14px;
    transition:border-color .2s ease, transform .15s ease;
  }
  .card:hover{ border-color:var(--pulse-dim); transform:translateY(-2px); }
  .card .t{ font-family:'Fraunces',serif; font-size:19px; font-weight:600; margin:0 0 4px; }
  .card .d{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-faint); }
  .arrow{ color:var(--pulse); font-family:'IBM Plex Mono',monospace; font-size:18px; }
  .foot{ text-align:center; color:var(--ink-faint); font-family:'IBM Plex Mono',monospace;
    font-size:11px; margin-top:30px; letter-spacing:0.05em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Central de Avaliações</div>
    <h1>Escolha uma categoria</h1>
    <p class="lead">Módulos de microlearning e autoavaliação para times clínicos e assistenciais.</p>

    <a class="card" href="alta-performance/">
      <div>
        <p class="t">Avaliações de Alta Performance</p>
        <p class="d">Enfermeiro · Técnico em Enfermagem</p>
      </div>
      <span class="arrow">→</span>
    </a>

    <div class="foot">MICROLEARNING · GESTÃO E LIDERANÇA CLÍNICA</div>
  </div>
</body>
</html>
